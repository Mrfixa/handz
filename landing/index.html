<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vito - Invitation</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#0f0f0f;color:#e0e0e0;min-height:100vh;display:flex;align-items:center;justify-content:center}
.container{max-width:420px;width:100%;padding:40px 24px;text-align:center}
.logo{font-size:32px;font-weight:700;color:#fff;margin-bottom:8px;letter-spacing:1px}
.subtitle{color:#888;font-size:14px;margin-bottom:40px}
.card{background:#1a1a1a;border-radius:16px;padding:32px 24px;border:1px solid #2a2a2a}
.icon{font-size:48px;margin-bottom:16px}
.status{font-size:18px;font-weight:600;margin-bottom:8px}
.detail{color:#999;font-size:14px;margin-bottom:24px;line-height:1.5}
.driver-name{color:#4fc3f7;font-weight:600}
.btn{display:inline-block;background:#4fc3f7;color:#0f0f0f;font-weight:600;font-size:16px;padding:14px 48px;border-radius:50px;text-decoration:none;transition:background .2s}
.btn:hover{background:#29b6f6}
.error{color:#ef5350}
.loading{color:#888}
.spinner{width:32px;height:32px;border:3px solid #333;border-top-color:#4fc3f7;border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 16px}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div class="container">
  <div class="logo">VITO</div>
  <div class="subtitle">Ride &amp; Delivery</div>
  <div class="card" id="card">
    <div class="spinner"></div>
    <div class="status loading">Validating invitation…</div>
  </div>
</div>
<script>
(function(){
  const params = new URLSearchParams(window.location.search);
  const token = params.get('token') || window.location.pathname.split('/').filter(Boolean).pop();
  const card = document.getElementById('card');

  if(!token || token.length !== 64 || !/^[A-Za-z0-9_-]+$/.test(token)){
    card.innerHTML = '<div class="icon">⚠️</div><div class="status error">Invalid Link</div><div class="detail">This invitation link is not valid.</div>';
    return;
  }

  function escapeHtml(str){
    var d=document.createElement('div');d.appendChild(document.createTextNode(str));return d.innerHTML;
  }

  var baseUrl = window.location.origin;
  fetch(baseUrl + '/api/qr/validate/' + encodeURIComponent(token))
    .then(function(r){ return r.json(); })
    .then(function(data){
      if(data.data && data.data.valid){
        var role = data.data.role || '';
        var driverName = data.data.driver_name || '';
        var html = '<div class="icon">✅</div>';
        if(role === 'customer' && driverName){
          html += '<div class="status">You\'re Invited!</div>';
          html += '<div class="detail">Referred by <span class="driver-name">' + escapeHtml(driverName) + '</span></div>';
        } else {
          html += '<div class="status">Welcome to Vito</div>';
          html += '<div class="detail">Your invitation is valid. Download the app to get started.</div>';
        }
        html += '<a class="btn" href="https://play.google.com/store/apps/details?id=com.vito.app">Download App</a>';
        card.innerHTML = html;
      } else {
        card.innerHTML = '<div class="icon">❌</div><div class="status error">Invitation Expired</div><div class="detail">This invitation has expired or been revoked. Please request a new one.</div>';
      }
    })
    .catch(function(){
      card.innerHTML = '<div class="icon">⚠️</div><div class="status error">Connection Error</div><div class="detail">Could not validate the invitation. Please try again.</div>';
    });
})();
</script>
</body>
</html>
