name: Build and Release v1.0

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g. v1.0.0)'
        required: true
        default: 'v1.0'
        type: string

jobs:
  build-driver-apk:
    name: Build Driver APK
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: drivemond-driver-app-3.1/HexaRide-Driver-app-release-3.1

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.0'
          channel: stable

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze
        run: flutter analyze --no-fatal-infos || true

      - name: Repair Android NDK if corrupt
        run: |
          SDK="${ANDROID_SDK_ROOT:-${ANDROID_HOME:-/usr/local/lib/android/sdk}}"
          for NDK_DIR in "$SDK"/ndk/*; do
            [ -d "$NDK_DIR" ] || continue
            if [ ! -f "$NDK_DIR/source.properties" ]; then
              VER=$(basename "$NDK_DIR")
              echo "Corrupt NDK $VER (no source.properties) — reinstalling"
              rm -rf "$NDK_DIR"
              yes | "$SDK/cmdline-tools/latest/bin/sdkmanager" --licenses >/dev/null 2>&1 || true
              yes | "$SDK/cmdline-tools/latest/bin/sdkmanager" "ndk;$VER" || true
            fi
          done

      - name: Setup release keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          KEYSTORE_PASS: ${{ secrets.KEYSTORE_PASS }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASS: ${{ secrets.KEY_PASS }}
        run: |
          if [ -n "$KEYSTORE_BASE64" ]; then
            echo "$KEYSTORE_BASE64" | base64 -d > android/app/release.jks
            printf 'storePassword=%s\nkeyPassword=%s\nkeyAlias=%s\nstoreFile=app/release.jks\n' \
              "$KEYSTORE_PASS" "$KEY_PASS" "$KEY_ALIAS" > android/key.properties
          fi

      - name: Build debug APK
        env:
          MAPBOX_DOWNLOADS_TOKEN: ${{ secrets.MAPBOX_DOWNLOADS_TOKEN }}
        run: |
          flutter build apk --debug \
            --dart-define=MAPS_API_KEY=${{ secrets.MAPS_API_KEY }} \
            --dart-define=STRIPE_PUBLISHABLE_KEY=${{ secrets.STRIPE_PUBLISHABLE_KEY }} \
            --dart-define=MAPBOX_ACCESS_TOKEN=${{ secrets.MAPBOX_ACCESS_TOKEN }}
        continue-on-error: true

      - name: Build release APK
        env:
          MAPBOX_DOWNLOADS_TOKEN: ${{ secrets.MAPBOX_DOWNLOADS_TOKEN }}
        run: |
          flutter build apk --release \
            --dart-define=MAPS_API_KEY=${{ secrets.MAPS_API_KEY }} \
            --dart-define=STRIPE_PUBLISHABLE_KEY=${{ secrets.STRIPE_PUBLISHABLE_KEY }} \
            --dart-define=MAPBOX_ACCESS_TOKEN=${{ secrets.MAPBOX_ACCESS_TOKEN }}

      - name: Stage APKs for upload
        run: |
          cp build/app/outputs/flutter-apk/app-debug.apk $GITHUB_WORKSPACE/vito-driver-debug.apk 2>/dev/null || true
          cp build/app/outputs/flutter-apk/app-release.apk $GITHUB_WORKSPACE/vito-driver-release.apk

      - name: Upload Driver Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: vito-driver-debug-apk
          path: vito-driver-debug.apk
          if-no-files-found: ignore

      - name: Upload Driver Release APK
        uses: actions/upload-artifact@v4
        with:
          name: vito-driver-release-apk
          path: vito-driver-release.apk

  build-user-apk:
    name: Build User APK
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: drivemond-user-app-3.1/HexaRide-User-app-release-3.1

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.0'
          channel: stable

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze
        run: flutter analyze --no-fatal-infos || true

      - name: Repair Android NDK if corrupt
        run: |
          SDK="${ANDROID_SDK_ROOT:-${ANDROID_HOME:-/usr/local/lib/android/sdk}}"
          for NDK_DIR in "$SDK"/ndk/*; do
            [ -d "$NDK_DIR" ] || continue
            if [ ! -f "$NDK_DIR/source.properties" ]; then
              VER=$(basename "$NDK_DIR")
              echo "Corrupt NDK $VER (no source.properties) — reinstalling"
              rm -rf "$NDK_DIR"
              yes | "$SDK/cmdline-tools/latest/bin/sdkmanager" --licenses >/dev/null 2>&1 || true
              yes | "$SDK/cmdline-tools/latest/bin/sdkmanager" "ndk;$VER" || true
            fi
          done

      - name: Setup release keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          KEYSTORE_PASS: ${{ secrets.KEYSTORE_PASS }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASS: ${{ secrets.KEY_PASS }}
        run: |
          if [ -n "$KEYSTORE_BASE64" ]; then
            echo "$KEYSTORE_BASE64" | base64 -d > android/app/release.jks
            printf 'storePassword=%s\nkeyPassword=%s\nkeyAlias=%s\nstoreFile=app/release.jks\n' \
              "$KEYSTORE_PASS" "$KEY_PASS" "$KEY_ALIAS" > android/key.properties
          fi

      - name: Build debug APK
        env:
          MAPBOX_DOWNLOADS_TOKEN: ${{ secrets.MAPBOX_DOWNLOADS_TOKEN }}
        run: |
          flutter build apk --debug \
            --dart-define=MAPS_API_KEY=${{ secrets.MAPS_API_KEY }} \
            --dart-define=STRIPE_PUBLISHABLE_KEY=${{ secrets.STRIPE_PUBLISHABLE_KEY }} \
            --dart-define=MAPBOX_ACCESS_TOKEN=${{ secrets.MAPBOX_ACCESS_TOKEN }}
        continue-on-error: true

      - name: Build release APK
        env:
          MAPBOX_DOWNLOADS_TOKEN: ${{ secrets.MAPBOX_DOWNLOADS_TOKEN }}
        run: |
          flutter build apk --release \
            --dart-define=MAPS_API_KEY=${{ secrets.MAPS_API_KEY }} \
            --dart-define=STRIPE_PUBLISHABLE_KEY=${{ secrets.STRIPE_PUBLISHABLE_KEY }} \
            --dart-define=MAPBOX_ACCESS_TOKEN=${{ secrets.MAPBOX_ACCESS_TOKEN }}

      - name: Stage APKs for upload
        run: |
          cp build/app/outputs/flutter-apk/app-debug.apk $GITHUB_WORKSPACE/vito-user-debug.apk 2>/dev/null || true
          cp build/app/outputs/flutter-apk/app-release.apk $GITHUB_WORKSPACE/vito-user-release.apk

      - name: Upload User Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: vito-user-debug-apk
          path: vito-user-debug.apk
          if-no-files-found: ignore

      - name: Upload User Release APK
        uses: actions/upload-artifact@v4
        with:
          name: vito-user-release-apk
          path: vito-user-release.apk

  build-admin-zip:
    name: Build Admin ZIP
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: drivemond-admin-new-install-3.1

    steps:
      - uses: actions/checkout@v4

      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: mbstring,xml,ctype,json,bcmath,pdo_mysql

      - name: Install Composer dependencies (production)
        run: composer install --no-dev --no-interaction --optimize-autoloader --ignore-platform-reqs

      - name: Create release ZIP
        working-directory: ${{ github.workspace }}
        env:
          VERSION: ${{ github.event.inputs.version }}
        run: |
          echo "Building admin ZIP for version $VERSION"
          TAG_VERSION="${VERSION#v}"
          zip -r "vito-admin-${TAG_VERSION}.zip" drivemond-admin-new-install-3.1 \
            --exclude "*/node_modules/*" \
            --exclude "*/.git/*" \
            --exclude "*/storage/logs/*" \
            --exclude "*/.env" \
            --exclude "*/storage/framework/cache/*" \
            --exclude "*/storage/framework/views/*" \
            --exclude "*/storage/framework/sessions/*"

      - name: Upload Admin ZIP
        uses: actions/upload-artifact@v4
        with:
          name: vito-admin-zip
          path: vito-admin-*.zip

  create-release:
    name: Create GitHub Release
    needs: [build-driver-apk, build-user-apk, build-admin-zip]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Download Driver Debug APK
        uses: actions/download-artifact@v4
        with:
          name: vito-driver-debug-apk
          path: release-assets/
        continue-on-error: true

      - name: Download Driver Release APK
        uses: actions/download-artifact@v4
        with:
          name: vito-driver-release-apk
          path: release-assets/

      - name: Download User Debug APK
        uses: actions/download-artifact@v4
        with:
          name: vito-user-debug-apk
          path: release-assets/
        continue-on-error: true

      - name: Download User Release APK
        uses: actions/download-artifact@v4
        with:
          name: vito-user-release-apk
          path: release-assets/

      - name: Download Admin ZIP
        uses: actions/download-artifact@v4
        with:
          name: vito-admin-zip
          path: release-assets/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.version }}
          name: Vito ${{ github.event.inputs.version }}
          body: |
            ## Vito v1.0 Release
            
            This release includes:
            - Driver APK (debug + release builds)
            - User APK (debug + release builds)
            - Admin Laravel Backend ZIP
            
            ### Unit Tests Added
            - 53 unit tests for MartPromoCode, MartOrder, and MartProduct models
          files: release-assets/*
          generate_release_notes: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
